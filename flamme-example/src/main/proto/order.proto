syntax = "proto3";

package com.amadeus.order;

option java_outer_classname = "OrderProtos";
option java_multiple_files = true;

message Order {
  string id = 1;
  string customer_email = 2;
  double total_amount = 3;
  repeated OrderItem items = 4;
}

message OrderItem {
  string sku = 1;
  int32 quantity = 2;
}
